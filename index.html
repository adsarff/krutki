<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Endfield Gacha Analyzer</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

input, button {
    margin-bottom: 20px;
    margin-right: 10px;
}

.section {
    margin-top: 40px;
}

.section h2 {
    margin-bottom: 10px;
}

.stats {
    margin-bottom: 10px;
    font-size: 16px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    padding: 6px;
    border-bottom: 1px solid #333;
    text-align: left;
}

th {
    background: #222;
}

tr.six { background: rgba(255, 0, 0, 0.4); }
tr.five { background: rgba(255,215,0,0.15); }
tr.four { background: rgba(138,43,226,0.15); }

.hidden {
    display: none;
}
</style>
</head>
<body>

<h1>Endfield Gacha Analyzer</h1>

<input type="file" id="fileInput" accept=".json">
<button id="clearCacheBtn">Очистить кеш</button>

<div id="content"></div>

<script>
window.addEventListener("DOMContentLoaded", () => {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;

        const stored = JSON.parse(raw);

        if (Array.isArray(stored)) {
            render(stored);
        }
    } catch(e) {
		console.warn("Битый кеш - удаляю");
        localStorage.removeItem(STORAGE_KEY);
    }
});
const STORAGE_KEY = "endfield_cache_simple";

const fileInput = document.getElementById('fileInput');
const content = document.getElementById('content');

fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e) {

        let pulls;

        try {
            const json = JSON.parse(e.target.result);
            pulls = Array.isArray(json) ? json : (json.data?.list || []);
        } catch(err) {
            alert("Ошибка JSON");
            return;
        }

        mergeAndRender(pulls);
    };

    reader.readAsText(file);
});
const clearBtn = document.getElementById("clearCacheBtn");

function mergeAndRender(newPulls) {

    let stored = [];

    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        stored = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(stored)) stored = [];
    } catch(e) {
        localStorage.removeItem(STORAGE_KEY);
        stored = [];
    }

    stored = stored.filter(p => p && p.seqId);

    const existing = new Set(stored.map(p => String(p.seqId)));

    newPulls.forEach(p => {
        if (p && p.seqId && !existing.has(String(p.seqId))) {
            stored.push(p);
        }
    });

    localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));

    render(stored);
}

function render(data) {

    content.innerHTML = "";

	if (!Array.isArray(data)) return; 

	data.sort((a, b) => Number(a.seqId || 0) - Number(b.seqId || 0));

	const pools = {};


    data.forEach(pull => {
        const pool = pull.poolName || "Unknown";
        if (!pools[pool]) pools[pool] = [];
        pools[pool].push(pull);
    });

    for (const pool in pools) {
        createSection(pool, pools[pool]);
    }
}

clearBtn.addEventListener("click", () => {

    if (!confirm("Удалить все сохранённые крутки?")) return;

    try {
        localStorage.removeItem(STORAGE_KEY);
    } catch(e) {
        console.warn("Ошибка очистки storage", e);
    }

    content.innerHTML = "";

    alert("Кеш очищен");
});

function createSection(poolName, pulls) {

    const section = document.createElement("div");
    section.className = "section";

    const title = document.createElement("h2");
    title.textContent = poolName;
    section.appendChild(title);

    const table = document.createElement("table");

    table.innerHTML =
        "<thead>" +
        "<tr>" +
        "<th>#</th>" +
        "<th>Дата</th>" +
        "<th>Персонаж</th>" +
        "<th>Редкость</th>" +
        "<th>SeqID</th>" +
        "</tr>" +
        "</thead><tbody></tbody>";

    const tbody = table.querySelector("tbody");

    pulls.forEach((pull, index) => {

        const row = document.createElement("tr");

        if (pull.rarity == 6) row.classList.add("six");
        if (pull.rarity == 5) row.classList.add("five");
        if (pull.rarity == 4) row.classList.add("four");

        const date = new Date(Number(pull.gachaTs));
        const formatted = date.toLocaleString();

        row.innerHTML =
            "<td>" + (index + 1) + "</td>" +
            "<td>" + formatted + "</td>" +
            "<td>" + (pull.charName || "-") + "</td>" +
            "<td>" + (pull.rarity || "-") + "★</td>" +
            "<td>" + (pull.seqId || "-") + "</td>";

        tbody.appendChild(row);
    });

    section.appendChild(table);
    content.appendChild(section);
}
</script>

</body>
</html>
