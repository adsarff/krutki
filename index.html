<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Endfield Gacha Analyzer</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

input {
    margin-bottom: 20px;
}

.section {
    margin-top: 40px;
}

.section h2 {
    margin-bottom: 10px;
}

.stats {
    margin-bottom: 10px;
    font-size: 16px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    padding: 6px;
    border-bottom: 1px solid #333;
    text-align: left;
}

th {
    background: #222;
}
tr.six { background: rgba(255, 0, 0, 0.4); }
tr.five { background: rgba(255,215,0,0.15); }
tr.four { background: rgba(138,43,226,0.15); }

.hidden {
    display: none;
}
</style>
</head>
<body>

<h1>Endfield Gacha Analyzer</h1>
<input type="file" id="fileInput" accept=".json">

<div id="content"></div>

<script>
const fileInput = document.getElementById('fileInput');
const content = document.getElementById('content');

fileInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const json = JSON.parse(e.target.result);
        const pulls = json.data?.list || json;
        render(pulls);
    };
    reader.readAsText(file);
});

function render(data) {

    content.innerHTML = "";

    // сортировка по seqId
    data.sort((a,b) => Number(a.seqId) - Number(b.seqId));

    // группировка по poolName
    const pools = {};
    data.forEach(pull => {
        if (!pools[pull.poolName]) {
            pools[pull.poolName] = [];
        }
        pools[pull.poolName].push(pull);
    });

    for (const poolName in pools) {
        createSection(poolName, pools[poolName]);
    }
}

function createSection(poolName, pulls) {

    const section = document.createElement("div");
    section.className = "section";

    const title = document.createElement("h2");
    title.textContent = poolName;
    section.appendChild(title);

    let total = pulls.length;
    let fiveStars = 0;

    pulls.forEach(p => {
        if (p.rarity == 5) fiveStars++;
    });

    const stats = document.createElement("div");
    stats.className = "stats";
    stats.innerHTML = `
        Всего круток: <b>${total}</b> |
        5★: <b>${fiveStars}</b> |
        Средний 5★: <b>${fiveStars ? (total / fiveStars).toFixed(1) : "-"}</b>
    `;
    section.appendChild(stats);

    const table = document.createElement("table");

    table.innerHTML = `
        <thead>
            <tr>
                <th>#</th>
                <th>Дата</th>
                <th>Персонаж</th>
                <th>Редкость</th>
                <th>SeqID</th>
            </tr>
        </thead>
        <tbody></tbody>
    `;

    const tbody = table.querySelector("tbody");

    pulls.forEach((pull, index) => {

        const row = document.createElement("tr");

		if (pull.rarity == 6) row.classList.add("six");
        if (pull.rarity == 5) row.classList.add("five");
        if (pull.rarity == 4) row.classList.add("four");

        const date = new Date(Number(pull.gachaTs));
        const formattedDate = date.toLocaleString();

        row.innerHTML = `
            <td>${index + 1}</td>
            <td>${formattedDate}</td>
            <td>${pull.charName}</td>
            <td>${pull.rarity}★</td>
            <td>${pull.seqId}</td>
        `;

        tbody.appendChild(row);
    });

    section.appendChild(table);
    content.appendChild(section);
}
</script>

</body>

</html>
